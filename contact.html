<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact - mia</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="web-logo.png" type="image/png">
</head>
<body>
    <header class="header">
        <nav>
            <a href="https://yanbmia.github.io/">
                <img src="logo.png" alt="MIA" class="nav-logo">
            </a>
            <ul>
                <li><a href="/more.html">MORE</a></li>
                <li><a href="/contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact" class="hidden-fade">
            <h1>contact me</h1>
        <section id="findme" class="hidden-fade">
            <div class="social-links">
                <span class="link-blue"><a href="https://linkedin.com/in/yanbmia" target="_blank">linkedin</a></span>
                <span class="link-green"><a href="https://github.com/yanbmia" target="_blank">github</a></span>
                <br>
                or reach out directly: <span class="link-red"><a href="mailto:yanbmia@gmail.com">yanbmia@gmail.com</a></span>
            </div>
        </section>
            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required placeholder="your message here..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">send</button>
            </form>

        </section>
    </main>

    <!-- Floating chatbot toggle button -->
    <button id="chatbotToggle" class="chatbot-toggle" aria-label="Open chatbot">💬</button>

    <!-- Chatbot side panel -->
    <div id="chatbotPanel" class="chatbot-panel">
        <div class="chatbot-panel-header">
            <span>Learn More</span>
            <button id="chatbotClose" class="chatbot-panel-close" aria-label="Close">&times;</button>
        </div>
        <div class="chatbot-container">
            <div id="chatLog" class="chat-log">
                <div class="chat-message bot">
                    <span class="chat-status" id="chatStatus">loading model...</span>
                </div>
            </div>
            <form id="chatForm" class="chat-form">
                <input type="text" id="chatInput" placeholder="ask a question..." autocomplete="off" disabled>
                <button type="submit" class="submit-btn" id="chatSubmit" disabled>↑</button>
            </form>
        </div>
    </div>

    <footer>
        <p>thanks for visiting :)</p>
    </footer>

    <script src="chatbot-data.js"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            
            // Create mailto link with pre-filled content
            const subject = encodeURIComponent('Contact from ' + email);
            const body = encodeURIComponent('From: ' + email + '\n\n' + message);
            const mailtoLink = `mailto:yanbmia@gmail.com?subject=${subject}&body=${body}`;
            
            // Open email client
            window.location.href = mailtoLink;
            
            // Optional: Clear the form after submission
            this.reset();
        });
    </script>
</body>
</html>
